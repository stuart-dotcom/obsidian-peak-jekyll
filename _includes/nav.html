<header class="site-header" role="banner">
  <div class="nav-inner">

    <a href="{{ site.baseurl }}/" class="nav-logo" aria-label="{{ site.title }} — Return to homepage">
      <picture>
        <source srcset="{{ site.baseurl }}/assets/images/Obsidian_Peak_Logo_.webp" type="image/webp" />
        <img
          src="{{ site.baseurl }}/assets/images/Obsidian_Peak_Logo_Tinified.jpg"
          alt="{{ site.title }}"
          width="40"
          height="40"
          loading="eager"
          decoding="async"
          class="nav-logo-img"
        />
      </picture>
      <span class="nav-logo-text">Obsidian Peak <span>Holdings</span></span>
    </a>

    <nav aria-label="Main navigation">
      <ul class="nav-links">
        <li><a href="{{ site.baseurl }}/"{% if page.url == '/' or page.url == '/index.html' %} class="active" aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ site.baseurl }}/services/"{% if page.url contains '/services' %} class="active" aria-current="page"{% endif %}>Services</a></li>
        <li><a href="{{ site.baseurl }}/about/"{% if page.url contains '/about' %} class="active" aria-current="page"{% endif %}>About</a></li>
        <li><a href="{{ site.baseurl }}/contact/"{% if page.url contains '/contact' %} class="active" aria-current="page"{% endif %}>Contact</a></li>
      </ul>
    </nav>

    <div class="nav-actions">
      <!-- Moon icon as default for dark mode; JS will update on load -->
      <button class="btn-theme-toggle" data-theme-toggle aria-label="Switch to light mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <a href="{{ site.baseurl }}/contact/" class="nav-cta">Get Started</a>
      <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </div>

  <nav id="mobile-nav" class="nav-mobile-menu" aria-label="Mobile navigation">
    <a href="{{ site.baseurl }}/"{% if page.url == '/' %} class="active" aria-current="page"{% endif %}>Home</a>
    <a href="{{ site.baseurl }}/services/"{% if page.url contains '/services' %} class="active" aria-current="page"{% endif %}>Services</a>
    <a href="{{ site.baseurl }}/about/"{% if page.url contains '/about' %} class="active" aria-current="page"{% endif %}>About</a>
    <a href="{{ site.baseurl }}/contact/"{% if page.url contains '/contact' %} class="active" aria-current="page"{% endif %}>Contact</a>
    <a href="{{ site.baseurl }}/contact/" class="nav-mobile-cta">Get Started</a>
  </nav>
</header>
