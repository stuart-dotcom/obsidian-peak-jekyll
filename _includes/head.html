<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />

<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="{{ site.title }}" />
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta property="og:url" content="{{ site.url }}{{ page.url }}" />

<!-- Canonical -->
<link rel="canonical" href="{{ site.url }}{{ page.url }}" />

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/images/favicon.svg" />

<!-- Fonts -->
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/base.css" />
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />

<!-- JSON-LD Schema (centralized) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ site.schema.type }}",
  "name": "{{ site.schema.name }}",
  "description": "{{ site.description }}",
  "url": "{{ site.schema.url }}",
  "email": "{{ site.schema.email }}",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "{{ site.schema.address.locality }}",
    "addressRegion": "{{ site.schema.address.region }}",
    "addressCountry": "{{ site.schema.address.country }}"
  }{% if page.schema_extra %},
  {{ page.schema_extra }}{% endif %}
}
</script>
{% if page.extra_schema %}{{ page.extra_schema }}{% endif %}
